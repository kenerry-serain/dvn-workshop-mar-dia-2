apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: "workshop-march-eks-cluster-ng-role"
  amiSelectorTerms:
    - alias: "al2023@latest"
  subnetSelectorTerms:
